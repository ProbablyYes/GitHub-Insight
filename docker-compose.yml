version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: gba-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: gba-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: gba-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: github_analytics
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: analytics
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./configs/clickhouse/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: gba-minio
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
      - "9002:9000"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123

  superset:
    image: apache/superset:4.0.1
    container_name: gba-superset
    depends_on:
      - clickhouse
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: github-stream-batch-analytics
    command: >
      /bin/sh -c "
      pip install clickhouse-connect &&
      superset db upgrade &&
      superset fab create-admin
        --username admin
        --firstname GitHub
        --lastname Analytics
        --email admin@example.com
        --password admin &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088"

  web:
    build:
      context: ./apps/web
    container_name: gba-web
    depends_on:
      - clickhouse
    ports:
      - "3000:3000"
    environment:
      CLICKHOUSE_URL: http://host.docker.internal:8123
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: analytics
      CLICKHOUSE_DATABASE: github_analytics
